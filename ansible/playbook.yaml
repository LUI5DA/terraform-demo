---
- name: Configure Azure VM and deploy Tetris
  hosts: web
  become: true
  gather_facts: true

  vars:
    app_source: ../app/index.html
    app_dest: /var/www/html/index.html

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure default web root exists
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy Tetris index.html
      ansible.builtin.copy:
        src: "{{ app_source }}"
        dest: "{{ app_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart nginx

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
